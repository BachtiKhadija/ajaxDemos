<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRUD Users App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <h2 class="mb-4">CRUD Users App (Card List)</h2>

  <!-- FORM -->
  <div class="card p-3 mb-3">
    <input id="name" class="form-control mb-2" placeholder="Nom">
    <input id="age" type="number" class="form-control mb-2" placeholder="Age">

    <button id="addBtn" class="btn btn-primary">Ajouter / Modifier</button>
  </div>

  <!-- SEARCH + SORT -->
  <div class="d-flex gap-2 mb-3">
    <input id="search" class="form-control" placeholder="Rechercher par nom...">
    <button id="sortBtn" class="btn btn-dark">Trier âge</button>
  </div>

  <!-- LIST -->
  <div id="list" class="row"></div>

</div>

<script>
/* =========================
   DATA
========================= */
let users = [
  { id: 1, name: "Ali", age: 20 },
  { id: 2, name: "Sara", age: 17 },
  { id: 3, name: "Yassine", age: 25 }
];

let editId = null;
let sortAsc = true;

/* =========================
   RENDER (MAP)
========================= */
function render(data) {
  const list = document.getElementById("list");

  list.innerHTML = data.map(user => `
    <div class="col-md-4 mb-3">
      <div class="card shadow p-3">

        <h5>${user.name}</h5>
        <p>Age: ${user.age}</p>

        <div class="d-flex gap-2">
          <button onclick="editUser(${user.id})" class="btn btn-warning btn-sm">Edit</button>
          <button onclick="deleteUser(${user.id})" class="btn btn-danger btn-sm">Delete</button>
        </div>

      </div>
    </div>
  `).join("");
}

render(users);

/* =========================
   CREATE + UPDATE
========================= */
document.getElementById("addBtn").addEventListener("click", () => {

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;

  if (!name || !age) return alert("Remplis tous les champs");

  if (editId) {
    users = users.map(u =>
      u.id === editId ? { ...u, name, age: Number(age) } : u
    );
    editId = null;
  } else {
    users.push({
      id: Date.now(),
      name,
      age: Number(age)
    });
  }

  clearForm();
  render(users);
});

/* =========================
   DELETE (FILTER)
========================= */
function deleteUser(id) {
  users = users.filter(user => user.id !== id);
  render(users);
}

/* =========================
   EDIT
========================= */
function editUser(id) {
  const user = users.find(u => u.id === id);

  document.getElementById("name").value = user.name;
  document.getElementById("age").value = user.age;

  editId = id;
}

/* =========================
   SEARCH (FILTER)
========================= */
document.getElementById("search").addEventListener("input", (e) => {

  const value = e.target.value.toLowerCase();

  const filtered = users.filter(user =>
    user.name.toLowerCase().includes(value)
  );

  render(filtered);
});

/* =========================
   SORT
========================= */
document.getElementById("sortBtn").addEventListener("click", () => {

  const sorted = [...users].sort((a, b) =>
    sortAsc ? a.age - b.age : b.age - a.age
  );

  sortAsc = !sortAsc;
  render(sorted);
});

/* =========================
   HELPERS
========================= */
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("age").value = "";
}
</script>

</body>
</html>
