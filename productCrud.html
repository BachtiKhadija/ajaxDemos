<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CRUD Produits</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Gestion des Produits</h2>

  <!-- FORMULAIRE -->
  <div class="card p-3 mb-4">
    <input type="hidden" id="produitId">

    <div class="row">
      <div class="col-md-3">
        <input type="text" id="nom" class="form-control" placeholder="Nom du produit">
      </div>

      <div class="col-md-2">
        <input type="number" id="prix" class="form-control" placeholder="Prix">
      </div>

      <div class="col-md-3">
        <select id="categorie" class="form-control">
          <option value="">Choisir catégorie</option>
          <option value="Electronique">Électronique</option>
          <option value="Vêtements">Vêtements</option>
          <option value="Maison">Maison</option>
          <option value="Jouets">Jouets</option>
        </select>
      </div>

      <div class="col-md-2">
        <input type="text" id="image" class="form-control" placeholder="URL Image">
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="saveProduit()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- RECHERCHE & FILTRE -->
  <div class="row mb-3">
    <div class="col-md-6">
      <input type="text" id="search" class="form-control" placeholder="Rechercher..." onkeyup="displayProduits()">
    </div>

    <div class="col-md-6">
      <select id="filter" class="form-control" onchange="displayProduits()">
        <option value="">Toutes les catégories</option>
        <option value="Electronique">Électronique</option>
        <option value="Vêtements">Vêtements</option>
        <option value="Maison">Maison</option>
        <option value="Jouets">Jouets</option>
      </select>
    </div>
  </div>

  <!-- TABLEAU -->
  <table class="table table-bordered text-center">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Nom</th>
        <th>Prix</th>
        <th>Catégorie</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let produits = [];
let editIndex = null;

// AJOUT / MODIFICATION
function saveProduit() {
  let nom = document.querySelector("#nom").value;
  let prix = document.querySelector("#prix").value;
  let categorie = document.querySelector("#categorie").value;
  let image = document.querySelector("#image").value;

  if (!nom || !prix || !categorie) {
    alert("Nom, prix et catégorie sont obligatoires");
    return;
  }

  if (editIndex === null) {
    produits.push({
      id: Date.now(),
      nom,
      prix,
      categorie,
      image
    });
  } else {
    produits[editIndex] = {
      id: produits[editIndex].id,
      nom,
      prix,
      categorie,
      image
    };
    editIndex = null;
  }

  clearForm();
  displayProduits();
}

// AFFICHAGE
function displayProduits() {
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let filtredData = produits.filter(p => p.nom.toLowerCase().includes(search));
  if (filter !== '') filtredData = filtredData.filter(p => p.categorie === filter);

  filtredData.forEach((p, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td><img src="${p.image}" width="50" height="50" style="object-fit:cover"></td>
        <td>${p.nom}</td>
        <td>${p.prix} €</td>
        <td>${p.categorie}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="editProduit(${index})">Modifier</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduit(${index})">Supprimer</button>
        </td>
      </tr>
    `;
  });
}

// MODIFIER
function editProduit(index) {
  let p = produits[index];
  document.querySelector("#produitId").value = p.id;
  document.querySelector("#nom").value = p.nom;
  document.querySelector("#prix").value = p.prix;
  document.querySelector("#categorie").value = p.categorie;
  document.querySelector("#image").value = p.image;

  editIndex = index;
}

// SUPPRIMER
function deleteProduit(index) {
  if (confirm("Supprimer ce produit ?")) {
    produits.splice(index, 1);
    displayProduits();
  }
}

// RÉINITIALISER FORMULAIRE
function clearForm() {
  document.getElementById("produitId").value = "";
  document.getElementById("nom").value = "";
  document.getElementById("prix").value = "";
  document.getElementById("categorie").value = "";
  document.getElementById("image").value = "";
}
</script>

</body>
</html>
