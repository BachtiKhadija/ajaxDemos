<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
<body>
  <div class="container my-5 border rounded bg-light p-4 w-75 mx-auto">
       <h2 class="text-start">Liste d'achat</h2>
      <div id="boissons">


      </div>
        <div class="my-3">
            <button type="button" onclick="calculer()">Calculer</button>
        </div>




    <script type="text/javascript">
        //afficher les boissons
   let boissons=[{id:1,nom:'thé',prix:6},{id:2,nom:'café',prix:15},{id:3,nom:'lait',prix:10}];
  let ch='';
   $(boissons).each(function(index,b){
       ch+=`<div class="form-check">
     <input class="form-check-input" type="checkbox" value="${b.prix}" id="boisson-${b.id}">
     <label class="form-check-label" for="boisson-${b.id}">
         ${b.nom}- ${b.prix}
  </label>
  
   <input type='number' class="ms-3" min='0'/>
</div>`;



   });

   $('#boissons').html(ch);
 
  const calculer=()=>{
    let total=0;
    let allCh=$('input[type="checkbox"]');
   let allInpts=$('input[type="number"]');
   $(allCh).each(function(index,c){
    if($(c).prop('checked')){
        total+=$(c).val()*$(allInpts[index]).val();
    }
   });
  alert(total);

  }


    </script>


   
   
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
