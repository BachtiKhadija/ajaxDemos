!<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRUD Users App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-light">

<div class="container py-4">
  <h2 class="mb-4">CRUD Users App (Card List)</h2>
  <div class="card p-3 mb-3">
    <input id="name" class="form-control mb-2" placeholder="Nom">
    <input id="age" type="number" class="form-control mb-2" placeholder="Age">
    <button id="addBtn" class="btn btn-primary">Enregistrer</button>
  </div>
  <div class="d-flex gap-2 mb-3">
    <input id="search" class="form-control" placeholder="Rechercher par nom...">
    <button id="sortBtn" class="btn btn-dark">Trier âge</button>
  </div>

  <div id="list" class="row"></div>

</div>

<script type="text/javascript">
let users = [
  { id: 1, name: "Ali", age: 20 },
  { id: 2, name: "Sara", age: 17 },
  { id: 3, name: "Yassine", age: 25 }
];

let editId = null;//en mode ajout
let sortAsc = true; //croissant

function render(data) {
  const list = $("#list");

  $(list).html($.map(data,user => `
    <div class="col-md-4 mb-3">
      <div class="card shadow p-3">

        <h5>${user.name}</h5>
        <p>Age: ${user.age}</p>

        <div class="d-flex gap-2">
          <button onclick="editUser(${user.id})" class="btn btn-warning btn-sm">Edit</button>
          <button onclick="deleteUser(${user.id})" class="btn btn-danger btn-sm">Delete</button>
        </div>

      </div>
    </div>
  `).join(""));
}
//appeler render onload
render(users);
//

$("#addBtn").on("click", () => {

  const name = $("#name").val();
  const age = $("#age").val();

  if (!name || !age){alert("Remplis tous les champs");
  return;}

  if (editId) {//on veut modifier
    users = $.map(users,u =>
      u.id === editId ? { id:u.id, name, age: Number(age) } : u
    );
    editId = null;//passer en mode ajout
  } else {
    users.push({
      id: Date.now(),
      name,
      age: Number(age)
    });
  }

  clearForm();
  render(users);
});


function deleteUser(id) {
  users = users.filter(u => u.id !== id);
  render(users);
}
//update en mode get
function editUser(id) {
  const user = users.find(u => u.id === id);
  $("#name").val(user.name);
  $("#age").val(user.age);
  editId = id;//activer le mode edit
}


$("#search").on("input", (e) => {

  const value = $(e.target).val().toLowerCase();

  const filtered = users.filter(user =>
    user.name.toLowerCase().includes(value)
  );

  render(filtered);
});


document.querySelector("#sortBtn").addEventListener("click", () => {
  const sorted = users.sort((a, b) =>
    sortAsc ? a['age'] - b.age : b.age - a.age
  );
  sortAsc = !sortAsc;
  render(sorted);
});


function clearForm() {
  $("#name").val("");
  $("#age").val("");
}
</script>

</body>
</html>
