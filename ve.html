<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul Valeur Énergétique - Plats Marocains</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .meal {
      display: flex;
      align-items: center;
      margin: 10px 0;
    }

    .meal input[type="number"] {
      width: 80px;
      margin-left: 10px;
      padding: 5px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }

    #total {
      text-align: center;
      font-size: 20px;
      color: #333;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calcul Valeur Énergétique du Repas Marocain</h1>

    <div class="meal">
      <input type="checkbox" class="meal-checkbox" data-calories="220" id="couscous">
      <label for="couscous">Couscous (220 kcal/100g)</label>
      <input type="number" class="meal-quantity" placeholder="g" min="0">
    </div>

    <div class="meal">
      <input type="checkbox" class="meal-checkbox" data-calories="250" id="tagine">
      <label for="tagine">Tajine de poulet (250 kcal/100g)</label>
      <input type="number" class="meal-quantity" placeholder="g" min="0">
    </div>

    <div class="meal">
      <input type="checkbox" class="meal-checkbox" data-calories="180" id="harira">
      <label for="harira">Harira (180 kcal/100g)</label>
      <input type="number" class="meal-quantity" placeholder="g" min="0">
    </div>

    <div class="meal">
      <input type="checkbox" class="meal-checkbox" data-calories="300" id="briouat">
      <label for="briouat">Briouats (300 kcal/100g)</label>
      <input type="number" class="meal-quantity" placeholder="g" min="0">
    </div>

    <div class="meal">
      <input type="checkbox" class="meal-checkbox" data-calories="200" id="seffa">
      <label for="seffa">Seffa (200 kcal/100g)</label>
      <input type="number" class="meal-quantity" placeholder="g" min="0">
    </div>

    <button id="calculate">Calculer la valeur énergétique totale</button>
    <div id="total">Total : 0 kcal</div>
  </div>

  <script>
    document.getElementById('calculate').addEventListener('click', function() {
      const checkboxes = document.querySelectorAll('.meal-checkbox');
      const quantities = document.querySelectorAll('.meal-quantity');
      let totalCalories = 0;

      checkboxes.forEach((checkbox, index) => {
        if (checkbox.checked) {
          const caloriesPer100g = parseFloat(checkbox.dataset.calories);
          const quantity = parseFloat(quantities[index].value) || 0;
          totalCalories += (caloriesPer100g * quantity) / 100;
        }
      });

      document.getElementById('total').textContent = 'Total : ' + totalCalories.toFixed(2) + ' kcal';
    });
  </script>
</body>
</html>
