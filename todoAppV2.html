<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">To-Do List</h2>

  <div class="input-group mb-3">
    <input type="text" id="taskInput" class="form-control" placeholder="Ajouter une tâche">
    <button class="btn btn-primary" onclick="addTask()">Ajouter</button>
  </div>

  <ul id="taskList" class="list-group"></ul>
</div>

<script>
let tasks = [];

function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();

  if (text === "") return;

  tasks.push({ text: text, done: false });
  input.value = "";
  render();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  render();
}

function editTask(index) {
  const newText = prompt("Modifier la tâche :", tasks[index].text);
  if (newText !== null && newText.trim() !== "") {
    tasks[index].text = newText.trim();
    render();
  }
}

function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    list.innerHTML += `
      <li class="list-group-item d-flex justify-content-between align-items-center">
        
        <span 
          onclick="toggleTask(${index})"
          style="cursor:pointer; ${task.done ? 'text-decoration: line-through; color: gray;' : ''}">
          ${task.text}
        </span>

        <div>
          <button class="btn btn-sm btn-warning me-2" onclick="editTask(${index})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteTask(${index})">Delete</button>
        </div>

      </li>
    `;
  });
}
</script>

</body>
</html>
