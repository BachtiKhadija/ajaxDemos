<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5 border rounded bg-light p-4 w-75 mx-auto">
       <h2 class="text-center">Liste d'achat</h2>
        <h3 class="text-center">Produits</h3>
        <div class="p-2" id="produits"></div>
        <h3 class="text-center">Catégories de remise</h3>
        <div class="p-2" id="categories"></div>
       <div class="d-flex justify-content-center p-2 my-2">
         <button class="btn mx-auto w-25 btn-primary" id="calculer">Calculer</button>
       </div>
         <div class="alert alert-light text-center d-none" id="res"></div>  
    </div>


     
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="text/javascript">
    let containerP=document.querySelector('#produits');
    let containerC=document.querySelector('#categories');
let ListP=[{id:1,nom:'pain',prix:2},{id:2,nom:'lait',prix:3},{id:3,nom:'fromage',prix:20},{id:4,nom:'fruits',prix:10}];
let cats=[{id:1,nom:'aucune',remise:0},{id:2,nom:'étudiant',remise:0.15},{id:3,nom:'VIP',remise:0.2}];
 //afficher les produits
ListP.forEach(function(p,pos){
   containerP.innerHTML+=`<div class="form-check">
     <input class="form-check-input" type="checkbox" value="${p.prix}" id="produit-${p.id}">
  <label class="form-check-label" for="produit-${p.id}">
    ${p.nom} - ${p.prix} DH
  </label>
</div>`;

  });

  //afficher les catégories
  let ch='';
cats.forEach(function(c,pos){
  ch+=`<div class="form-check">
  <input class="form-check-input" value="${c.remise}" type="radio" name="cat" id="categorie-${c.id}">
  <label class="form-check-label" for="categorie-${c.id}">
    ${c.nom} 
  </label>
</div>`;
 //containerC.innerHTML=ch;
 containerC.innerHTML='';
 containerC.insertAdjacentHTML('beforeend',ch);


});
//gérer le clic sur le bouton calculer 

document.querySelector('#calculer').onclick=(e)=>{
  let total=0;
  //alert(document.querySelectorAll('input[type=checkbox]:checked').length);
  let products=document.querySelectorAll('input[type=checkbox]:checked');
  for(let p of products){
    total+=Number(p.value);
  }
  //mettre le total en fct de la catégorie
  let cs=document.querySelectorAll('input[type="radio"]');
  for(let c of cs){
    if(c.checked){
        total=total-total*Number(c.value);
        break;
    }
  }
  document.querySelector('#res').innerHTML=`Total : ${total} DH`;
  document.querySelector('#res').classList.remove('d-none');



}



</script>



</body>
</html>
