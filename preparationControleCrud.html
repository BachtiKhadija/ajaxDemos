<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CRUD Stagiaires</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Gestion des Stagiaires</h2>

  <!-- FORM -->
  <div class="card p-3 mb-4">
    <input type="hidden" id="stagiaireId">

    <div class="row">
      <div class="col-md-3">
        <input type="text" id="nom" class="form-control" placeholder="Nom">
      </div>

      <div class="col-md-3">
        <input type="text" id="photo" class="form-control" placeholder="URL Photo">
      </div>

      <div class="col-md-3">
        <select id="filiere" class="form-control">
          <option value="">Choisir filière</option>
          <option value="Dev">Développement</option>
          <option value="Réseaux">Réseaux</option>
          <option value="Gestion">Gestion</option>
          <option value="Design">Design</option>
        </select>
      </div>

      <div class="col-md-3">
        <button class="btn btn-primary w-100" onclick="saveStagiaire()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- SEARCH & FILTER -->
  <div class="row mb-3">
    <div class="col-md-6">
      <input type="text" id="search" class="form-control" placeholder="Rechercher..." onkeyup="displayStagiaires()">
    </div>

    <div class="col-md-6">
      <select id="filter" class="form-control" onchange="displayStagiaires()">
        <option value="">Toutes les filières</option>
        <option value="Dev">Développement</option>
        <option value="Réseaux">Réseaux</option>
        <option value="Gestion">Gestion</option>
        <option value="Design">Design</option>
      </select>
    </div>
  </div>

  <!-- TABLE -->
  <table class="table table-bordered text-center">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Photo</th>
        <th>Nom</th>
        <th>Filière</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let stagiaires = [];
let editIndex = null;

// ADD / UPDATE
function saveStagiaire() {
  let nom = document.getElementById("nom").value;
  let photo = document.getElementById("photo").value;
  let filiere = document.getElementById("filiere").value;

  if (!nom || !filiere) {
    alert("Nom et filière obligatoires");
    return;
  }

  if (editIndex === null) {
    stagiaires.push({
      id: Date.now(),
      nom,
      photo,
      filiere
    });
  } else {
    stagiaires[editIndex] = {
      id: stagiaires[editIndex].id,
      nom,
      photo,
      filiere
    };
    editIndex = null;
  }

  clearForm();
  displayStagiaires();
}

// DISPLAY
function displayStagiaires() {
  let search = document.getElementById("search").value.toLowerCase();
  let filter = document.getElementById("filter").value;

  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  stagiaires
    .filter(s => s.nom.toLowerCase().includes(search))
    .filter(s => filter === "" || s.filiere === filter)
    .forEach((s, index) => {
      tbody.innerHTML += `
        <tr>
          <td>${s.id}</td>
          <td><img src="${s.photo}" width="50" height="50" style="object-fit:cover"></td>
          <td>${s.nom}</td>
          <td>${s.filiere}</td>
          <td>
            <button class="btn btn-warning btn-sm" onclick="editStagiaire(${index})">Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="deleteStagiaire(${index})">Supprimer</button>
          </td>
        </tr>
      `;
    });
}

// EDIT
function editStagiaire(index) {
  let s = stagiaires[index];
  document.getElementById("stagiaireId").value = s.id;
  document.getElementById("nom").value = s.nom;
  document.getElementById("photo").value = s.photo;
  document.getElementById("filiere").value = s.filiere;

  editIndex = index;
}

// DELETE
function deleteStagiaire(index) {
  if (confirm("Supprimer ce stagiaire ?")) {
    stagiaires.splice(index, 1);
    displayStagiaires();
  }
}

// CLEAR
function clearForm() {
  document.getElementById("stagiaireId").value = "";
  document.getElementById("nom").value = "";
  document.getElementById("photo").value = "";
  document.getElementById("filiere").value = "";
}
</script>

</body>
</html>
