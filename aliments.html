<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container w-75 mx-auto p-3 my-5 bg-light rounded">
    <select id="selectAliments">
  <option>Choisir un aliment</option>
</select>

<div id="details"></div>
</div>
<script type="text/javascript">
 let aliments = [];

async function chargerAliments() {
  const response = await fetch("aliments.json");
  aliments = await response.json();

  const select = document.getElementById("selectAliments");

  // Extraire noms distincts
  const noms = [...new Set(aliments.map(a => a.nom))];

  noms.forEach(nom => {
    const option = document.createElement("option");
    option.value = nom;
    option.textContent = nom;
    select.appendChild(option);
  });
}

document.getElementById("selectAliments").addEventListener("change", function () {
  const nomChoisi = this.value;//

  const aliment = aliments.find(a => a.nom === nomChoisi);

  if (aliment) {
    document.getElementById("details").innerHTML = `
      <p><strong>Origine:</strong> ${aliment.origine}</p>
      <p><strong>Calories:</strong> ${aliment.calories}</p>
      <p><strong>Saison:</strong> ${aliment.saison}</p>
      <p><strong>Fibres:</strong> ${aliment.fibres}</p>
      <p><strong>Vitamines:</strong> ${aliment.vitamines}</p>
    `;
  }
});

chargerAliments();




</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
